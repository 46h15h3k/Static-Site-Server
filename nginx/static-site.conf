# /etc/nginx/conf.d/static-site.conf
#
# Minimal nginx server block for a static site.
# On Amazon Linux 2023, drop this file straight into /etc/nginx/conf.d/ —
# nginx.conf includes *.conf from that directory automatically, there's no
# sites-available/sites-enabled step like on Debian/Ubuntu.
#
# Works out of the box for IP-based access. If you have a domain,
# swap server_name as shown below and follow the HTTPS section in the README.

server {
    listen 80;
    listen [::]:80;

    # Option A — no domain yet, serve on the instance's public IP:
    server_name _;

    # Option B — you have a domain pointed at this server's IP via an A record:
    # server_name example.com www.example.com;

    root /var/www/site;
    index index.html;

    # Serve files directly; fall back to index.html for unknown paths
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets aggressively; HTML stays revalidated
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Basic hardening
    server_tokens off;
    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/static-site.access.log;
    error_log  /var/log/nginx/static-site.error.log;
}
